    <style>
        .attestation{
            width: 42%;
            height: auto;
            background-color: white;
            transition: transform .1s;
        }
    
        .href-scroll{
            scroll-margin-top: 150px;
            scroll-behavior: smooth;
    
        }
    </style>
    
    <script>
            document.addEventListener('scroll', minimizeAll);
            const elements = document.getElementsByClassName('attestation');
            for(let i=0; i<elements.length; i++){
                elements[i].addEventListener('click', maximizeOrMinimize);
            }
    
    
            function maximizeOrMinimize(){
                this.style.transform = (this.style.transform.length == 0)? 'scale(1.5)': null;
                for(let i=0; i<elements.length; i++){
                    if(elements[i] !== this) elements[i].style.transform = null;
                }
            }
    
            function minimizeAll(){
                for(let i=0; i<elements.length; i++){
                    elements[i].style.transform = null;
                }
            }
    </script>
